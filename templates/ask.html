<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ask Shorty</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b1020;
      color: #f5f5f7;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .shell {
      max-width: 900px;
      margin: 40px auto;
      padding: 24px 20px 40px;
    }
    .card {
      background: radial-gradient(circle at top left, #1f2937, #020617);
      border-radius: 20px;
      border: 1px solid rgba(148, 163, 184, 0.3);
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.9);
      padding: 24px 24px 28px;
    }
    h1 {
      margin: 0 0 4px;
      font-size: 26px;
      letter-spacing: 0.03em;
    }
    .tagline {
      margin: 0 0 20px;
      color: #9ca3af;
      font-size: 14px;
    }
    label {
      font-size: 13px;
      color: #d1d5db;
      display: block;
      margin-bottom: 4px;
    }
    textarea {
      width: 100%;
      min-height: 80px;
      resize: vertical;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #4b5563;
      background: rgba(15, 23, 42, 0.9);
      color: #e5e7eb;
      font-size: 14px;
      box-sizing: border-box;
    }
    textarea:focus {
      outline: 2px solid #38bdf8;
      outline-offset: 1px;
      border-color: transparent;
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    input[type="text"] {
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid #4b5563;
      background: rgba(15, 23, 42, 0.9);
      color: #e5e7eb;
      font-size: 13px;
    }
    input[type="text"]:focus {
      outline: 2px solid #38bdf8;
      outline-offset: 1px;
      border-color: transparent;
    }
    button {
      border-radius: 999px;
      border: none;
      padding: 8px 18px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #022c22;
      box-shadow: 0 10px 25px rgba(22, 163, 74, 0.55);
    }
    button:disabled {
      opacity: 0.6;
      cursor: default;
      box-shadow: none;
    }
    .answer-card {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid rgba(148, 163, 184, 0.4);
    }
    .answer-title {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #9ca3af;
      margin-bottom: 8px;
    }
    .answer-box {
      background: rgba(15, 23, 42, 0.85);
      border-radius: 14px;
      border: 1px solid rgba(148, 163, 184, 0.4);
      padding: 14px 14px 12px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .meta {
      margin-top: 6px;
      font-size: 11px;
      color: #9ca3af;
    }
    .error {
      margin-top: 10px;
      color: #fecaca;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="card">
      <h1>Ask Shorty</h1>
      <p class="tagline">Ask anything from your indexed videos &amp; podcasts. Answers come from transcripts, Shorties, and synthetic questions.</p>

      <label for="question">Question</label>
      <textarea id="question" placeholder="e.g. What did I watch about DCS-3000 and Red Hook?"></textarea>

      <div class="controls">
        <div style="display:flex;flex-direction:column;gap:2px;">
          <label for="video-filter" style="margin:0;font-size:11px;">Limit to video IDs (optional, comma-separated)</label>
          <input id="video-filter" type="text" placeholder="e.g. dQw4w9WgXcQ, abc123xyz89" />
        </div>
        <div style="flex:1;"></div>
        <button id="ask-btn">
          <span>Ask Shorty</span>
        </button>
      </div>

      <div id="error" class="error" style="display:none;"></div>

      <div class="answer-card" id="answer-card" style="display:none;">
        <div class="answer-title">Answer</div>
        <div class="answer-box" id="answer-box"></div>
        <div class="meta" id="meta-box"></div>
      </div>
      <div class="meta" id="status-line" style="margin-top:8px;"></div>
    </div>
  </div>

  <script>
    const askBtn = document.getElementById("ask-btn");
    const qEl = document.getElementById("question");
    const vidEl = document.getElementById("video-filter");
    const errEl = document.getElementById("error");
    const answerCard = document.getElementById("answer-card");
    const answerBox = document.getElementById("answer-box");
    const metaBox = document.getElementById("meta-box");
    const statusLine = document.getElementById("status-line");

    async function doAsk() {
      const q = qEl.value.trim();
      const rawVideos = vidEl.value.trim();
      errEl.style.display = "none";
      errEl.textContent = "";
      answerCard.style.display = "none";
      answerBox.textContent = "";
      metaBox.textContent = "";
      statusLine.textContent = "";

      if (!q) {
        errEl.textContent = "Please enter a question.";
        errEl.style.display = "block";
        return;
      }

      askBtn.disabled = true;
      askBtn.textContent = "Thinking...";
      try {
        let video_ids = null;
        if (rawVideos) {
          video_ids = rawVideos.split(",").map(v => v.trim()).filter(Boolean);
        }
        console.log("[ask-ui] Sending /api/ask with question:", q, "video_ids:", video_ids);
        const resp = await fetch("/api/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question: q, video_ids })
        });
        let data = null;
        try {
          data = await resp.json();
        } catch (jsonErr) {
          console.error("[ask-ui] Failed to parse /api/ask JSON:", jsonErr);
          throw new Error("Failed to parse server response from /api/ask");
        }
        console.log("[ask-ui] /api/ask response:", resp.status, data);
        if (!resp.ok || !data.success) {
          throw new Error(data.error || "Failed to start Ask job.");
        }

        const jobId = data.job_id;
        console.log("[ask-ui] Received jobId:", jobId);
        statusLine.textContent = `Thinking... job #${jobId}`;

        // Poll for up to 5 minutes (300 seconds)
        const maxMs = 300000;
        const intervalMs = 2000;

        async function pollOnce(elapsedMs) {
          console.log("[ask-ui] pollOnce called, elapsedMs=", elapsedMs, "jobId=", jobId);
          if (elapsedMs >= maxMs) {
            statusLine.textContent = "";
            errEl.textContent = "Timed out waiting for Ask Shorty to finish. Please try again.";
            errEl.style.display = "block";
            askBtn.disabled = false;
            askBtn.textContent = "Ask Shorty";
            return;
          }

          try {
            const r = await fetch(`/api/ask/result/${jobId}`);
            let body = null;
            try {
              body = await r.json();
            } catch (jsonErr) {
              console.error("[ask-ui] Failed to parse /api/ask/result JSON:", jsonErr);
              throw new Error("Failed to parse server response from /api/ask/result");
            }
            console.log("[ask-ui] /api/ask/result response:", r.status, body);

            if (!r.ok) {
              // Treat HTTP error as fatal for this job
              throw new Error(body.error || "Error fetching result.");
            }

            if (body.status === "pending" || body.status === "running") {
              statusLine.textContent = `Thinking... (${body.status})`;
              console.log("[ask-ui] Job still in progress, scheduling next poll...");
              setTimeout(() => pollOnce(elapsedMs + intervalMs), intervalMs);
              return;
            }

            // Completed or error: stop polling
            if (body.status === "error" || !body.success) {
              const msg = body.error || "Process crashed - please retry";
              statusLine.textContent = "";
              errEl.textContent = msg;
              errEl.style.display = "block";
              askBtn.disabled = false;
              askBtn.textContent = "Ask Shorty";
              console.log("[ask-ui] Job completed with error:", msg);
              return;
            }

            // status === completed and success === true
            statusLine.textContent = "Answer ready.";
            answerBox.textContent = body.answer || "(No answer returned.)";
            const ctx = body.used_context || [];
            metaBox.textContent = ctx.length
              ? `Used ${ctx.length} context passages across transcript chunks, Shorties, and synthetic questions.`
              : "No context details available.";
            answerCard.style.display = "block";
            askBtn.disabled = false;
            askBtn.textContent = "Ask Shorty";
          } catch (err) {
            console.error("[ask-ui] Polling error:", err);
            statusLine.textContent = "";
            errEl.textContent = err.message || String(err);
            errEl.style.display = "block";
            askBtn.disabled = false;
            askBtn.textContent = "Ask Shorty";
          }
        }

        // Kick off first poll
        pollOnce(0);
      } catch (e) {
        errEl.textContent = e.message || String(e);
        errEl.style.display = "block";
      } finally {
        // Button will be re-enabled by polling completion / error handlers.
      }
    }

    askBtn.addEventListener("click", doAsk);
    qEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) {
        doAsk();
      }
    });
  </script>
</body>
</html>
